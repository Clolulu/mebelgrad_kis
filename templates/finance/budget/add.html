{% extends "base.html" %}

{% block title %}Новая статья бюджета | КИС "МебельГрад"{% endblock %}

{% block content %}
<section class="hero-strip">
    <div class="text-uppercase text-secondary small">Финансы / Бюджетирование</div>
    <h1 class="h3 mb-2">Добавление бюджетной статьи</h1>
    <p class="mb-0">Формирование плана доходов и расходов по выбранному периоду и категории.</p>
</section>

<div class="row">
    <div class="col-xl-8">
        <div class="surface p-4">
            <form method="post" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label" for="period">Период</label>
                    <input class="form-control" id="period" name="period" type="month" value="{{ period }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="item_type">Тип статьи</label>
                    <select class="form-select" id="item_type" name="item_type" required>
                        <option value="income">Доход</option>
                        <option value="expense">Расход</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="planned_amount">Плановая сумма, ₽</label>
                    <input class="form-control" id="planned_amount" name="planned_amount" type="number" step="0.01" required>
                </div>
                <div class="col-12">
                    <label class="form-label" for="category">Категория</label>
                    <input class="form-control" id="category" name="category" placeholder="Например: Продажи, Закупки, Логистика" required>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Сохранить статью</button>
                    <a href="{{ url_for('finance.budget', period=period) }}" class="btn btn-outline-secondary">Назад к бюджету</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
