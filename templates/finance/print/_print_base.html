<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block print_title %}Финансовый отчёт{% endblock %} - {{ company.company_name or 'Компания' }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        @media print {
            body { margin: 0; padding: 0; }
            .no-print { display: none !important; }
            .page-break { page-break-after: always; }
        }
        body {
            font-family: 'Roboto', 'Times New Roman', 'Arial', sans-serif;
            margin: 20px;
            line-height: 1.4;
            color: #333;
            background: white;
            font-size: 12px;
        }
        .print-header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .company-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        .company-info {
            flex: 1;
            text-align: center;
            margin: 0 20px;
        }
        .company-name {
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0;
        }
        .company-legal-form {
            font-size: 12px;
            color: #666;
        }
        .company-rekvizity {
            font-size: 11px;
            margin-top: 5px;
            line-height: 1.3;
        }
        .company-seal {
            width: 100px;
            height: 100px;
            object-fit: contain;
            opacity: 0.3;
        }
        
        .report-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin: 20px 0;
            text-transform: uppercase;
        }
        
        .report-period {
            text-align: center;
            font-size: 13px;
            margin-bottom: 20px;
            color: #555;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
        
        th {
            background-color: #f5f5f5;
            font-weight: bold;
            font-size: 12px;
        }
        
        td {
            font-size: 12px;
        }
        
        .currency {
            text-align: right;
        }
        
        .number {
            text-align: right;
        }
        
        .total-row {
            font-weight: bold;
            background-color: #efefef;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 10px;
            border-bottom: 1px solid #999;
            padding-bottom: 5px;
        }
        
        .signature-block {
            position: relative;
            margin-top: 40px;
            display: flex;
            justify-content: space-around;
            page-break-inside: avoid;
        }

        .signature {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 200px;
        }

        .seal-overlay {
            position: absolute;
            right: 20px;
            top: 0;
            width: 140px;
            height: 140px;
            z-index: 2;
            opacity: 0.25;
            pointer-events: none;
        }

        .seal-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .signature-space {
            border-top: 1px solid #000;
            height: 60px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 5px;
        }
        
        .signature-image {
            max-width: 150px;
            max-height: 40px;
            object-fit: contain;
        }
        
        .signature-line {
            font-size: 11px;
            color: #666;
        }
        
        .signature-name {
            font-weight: bold;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .signature-position {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }
        
        .footer {
            margin-top: 30px;
            border-top: 1px solid #999;
            padding-top: 15px;
            font-size: 10px;
            color: #999;
            text-align: center;
            line-height: 1.5;
            page-break-inside: avoid;
        }
        
        .no-print {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .print-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn:hover {
            background-color: #0056b3;
        }
        
        .alert {
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid;
            border-radius: 4px;
        }
        
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        
        .alert-warning {
            background-color: #fff3cd;
            color: #856404;
            border-color: #ffeaa7;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }

        .kpi-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            page-break-inside: avoid;
        }
        
        .kpi-card {
            flex: 1;
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            margin: 0 5px;
        }
        
        .kpi-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .kpi-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    {% block print_content %}
    {% endblock %}
</body>
</html>
