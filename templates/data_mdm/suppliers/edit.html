{% extends "base.html" %}

{% block title %}Редактирование поставщика | КИС "МебельГрад"{% endblock %}

{% block content %}
<section class="hero-strip">
    <div class="text-uppercase text-secondary small">Управление данными / Поставщики</div>
    <h1 class="h3 mb-2">Редактирование карточки поставщика</h1>
    <p class="mb-0">Актуализация реквизитов, контактных данных и статуса контрагента.</p>
</section>

<div class="row">
    <div class="col-xl-8">
        <div class="surface p-4">
            <form method="post" class="row g-3">
                <div class="col-md-8">
                    <label class="form-label" for="name">Наименование</label>
                    <input class="form-control" id="name" name="name" value="{{ supplier.name }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="inn">ИНН</label>
                    <input class="form-control" id="inn" name="inn" value="{{ supplier.inn or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="phone">Телефон</label>
                    <input class="form-control" id="phone" name="phone" value="{{ supplier.phone or '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="email">Электронная почта</label>
                    <input class="form-control" id="email" name="email" type="email" value="{{ supplier.email or '' }}">
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" id="is_active" name="is_active" type="checkbox" {% if supplier.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Карточка активна</label>
                    </div>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Сохранить изменения</button>
                    <a href="{{ url_for('mdm.suppliers_list') }}" class="btn btn-outline-secondary">Назад к реестру</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
