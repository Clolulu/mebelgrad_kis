{% extends "base.html" %}

{% block title %}Создание клиента | КИС "МебельГрад"{% endblock %}

{% block content %}
<section class="hero-strip">
    <div class="text-uppercase text-secondary small">Управление данными / Клиенты</div>
    <h1 class="h3 mb-2">Новая карточка клиента</h1>
    <p class="mb-0">Создание записи контрагента для работы с продажами, взаиморасчетами и документами.</p>
</section>

<div class="row">
    <div class="col-xl-8">
        <div class="surface p-4">
            <form method="post" class="row g-3">
                <div class="col-md-8">
                    <label class="form-label" for="name">ФИО или наименование</label>
                    <input class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="type">Тип клиента</label>
                    <select class="form-select" id="type" name="type">
                        <option value="individual">Физическое лицо</option>
                        <option value="legal_entity">Юридическое лицо</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="phone">Телефон</label>
                    <input class="form-control" id="phone" name="phone">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="email">Электронная почта</label>
                    <input class="form-control" id="email" name="email" type="email">
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" id="is_active" name="is_active" type="checkbox" checked>
                        <label class="form-check-label" for="is_active">Карточка активна</label>
                    </div>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Сохранить клиента</button>
                    <a href="{{ url_for('mdm.customers_list') }}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
